name: campus_event_organizer
description: "Aplikasi Event Organizer Kampus"  
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.18.1
  supabase_flutter: ^1.4.0
  uuid: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icon.png"
  image_path: "assets/icon.png"

dependency_overrides:
  sign_in_with_apple: ^4.1.0